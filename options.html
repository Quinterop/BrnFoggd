<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Time Limiter – Options</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: 40px auto;
            color: #eee;
            background: #1a1a2e;
            padding: 0 20px;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #aaa;
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            margin-bottom: 16px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        button:hover {
            background: #357ab8;
        }

        #status {
            margin-top: 12px;
            color: #6fcf97;
            font-size: 0.85rem;
            height: 16px;
        }

        .site-list {
            list-style: none;
            padding: 0;
            margin-bottom: 16px;
        }

        .site-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .site-list button {
            padding: 2px 8px;
            background: #c0392b;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <h1>⏱ Time Limiter – Options</h1>

    <label>Sites (one per line, e.g. reddit.com)</label>
    <ul class="site-list" id="siteList"></ul>
    <input type="text" id="newSite" placeholder="youtube.com" />
    <button id="addSite">Add site</button>

    <br><br>

    <label>Max time per session (minutes)</label>
    <input type="number" id="maxMinutes" min="1" />

    <label>Max visits per day</label>
    <input type="number" id="maxVisits" min="1" />

    <label>Daily reset hour (0–23)</label>
    <input type="number" id="resetHour" min="0" max="23" />

    <br>
    <button id="save">Save</button>
    <div id="status"></div>

    <script src="options.js"></script>
</body>

</html>
